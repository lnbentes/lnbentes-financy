version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    volumes:
      - db_data:/app/data
      - django_static:/app/staticfiles
    environment:
      - DATABASE_PATH=/app/data/db.sqlite3
      - STATIC_ROOT=/app/staticfiles
      - ALLOWED_HOSTS=*
      - DEBUG=False
      - SECRET_KEY=django-insecure-production-key-change-me-12345
      # IMPORTANT: If you access the application using your Debian server's IP
      # (e.g., http://192.168.1.100:8080), you must add that address to this list:
      - CSRF_TRUSTED_ORIGINS=http://localhost:8080,http://127.0.0.1:8080,http://localhost,http://127.0.0.1
    expose:
      - "8000"
    restart: always

  frontend:
    build:
      context: ..
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "8080:80"
    volumes:
      - django_static:/usr/share/nginx/html/static
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
    driver: local
  django_static:
    driver: local
