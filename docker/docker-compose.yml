services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    volumes:
      - db_data:/app/data
      - django_static:/app/staticfiles
    env_file:
      - ../.env
    environment:
      - DATABASE_PATH=/app/data/db.sqlite3
      - STATIC_ROOT=/app/staticfiles
    expose:
      - "8000"
    restart: always

  frontend:
    build:
      context: ..
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "8080:80"
    volumes:
      - django_static:/usr/share/nginx/html/static
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
    driver: local
  django_static:
    driver: local
