{% load static %}
{% comment %}Cache-buster: incrementar este valor ao deploiar mudanças no JS/CSS{% endcomment %}
{% with v="5" %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeTo's House - Eco Home Manager</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/main.css' %}?v={{ v }}">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        earth: {
                            50: '#f7f6f5',
                            100: '#edeae6',
                            200: '#d9d2cb',
                            300: '#bfb1a4',
                            400: '#a6907f',
                            500: '#8e725f',
                            600: '#755d4d',
                            700: '#614d41',
                            800: '#524138',
                            900: '#453831',
                            950: '#251d1a',
                        },
                        forest: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                            950: '#052e16',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Outfit', 'serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-earth-50 dark:bg-earth-950 text-earth-900 dark:text-earth-50 transition-colors duration-300">
    <div id="app-root">
        {% block content %}{% endblock %}
    </div>

    <!-- Ionicons for Lucide replacements (simplified for vanilla) -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- ═══════════════════════════════════════════
         Camada de API
         ─────────────────────────────────────────── -->
    <!-- HTTP infrastructure (getCookie + request) -->
    <script src="{% static 'js/api/http.js' %}?v={{ v }}"></script>
    <!-- Módulos por domínio -->
    <script src="{% static 'js/api/modules/auth.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/api/modules/users.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/api/modules/tasks.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/api/modules/finance.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/api/modules/places.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/api/modules/events.js' %}?v={{ v }}"></script>
    <!-- Agregador (monta o objeto global `api`) -->
    <script src="{% static 'js/api/index.js' %}?v={{ v }}"></script>

    <!-- ═══════════════════════════════════════════
         Core da aplicação
         ─────────────────────────────────────────── -->
    <script src="{% static 'js/core/state.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/core/theme.js' %}?v={{ v }}"></script>

    <!-- ═══════════════════════════════════════════
         UI Core
         ─────────────────────────────────────────── -->
    <script src="{% static 'js/ui.js' %}?v={{ v }}"></script>

    <!-- Router (depende de ui + state) -->
    <script src="{% static 'js/core/router.js' %}?v={{ v }}"></script>

    <!-- ═══════════════════════════════════════════
         Sistema de Modais
         ─────────────────────────────────────────── -->
    <script src="{% static 'js/components/modals/modal.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/components/modals/task-modal.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/components/modals/place-modal.js' %}?v={{ v }}"></script>
    <!-- Modais financeiros -->
    <script src="{% static 'js/components/modals/finance/transaction-modal.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/components/modals/finance/account-modal.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/components/modals/finance/category-modal.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/components/modals/finance/data-modal.js' %}?v={{ v }}"></script>

    <!-- ═══════════════════════════════════════════
         Views individuais (estendem `ui`)
         ─────────────────────────────────────────── -->
    <script src="{% static 'js/views/login.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/views/dashboard.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/views/tasks.js' %}?v={{ v }}"></script>
    <!-- View Financeiro (dividida em módulos) -->
    <script src="{% static 'js/views/finance/state.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/views/finance/loader.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/views/finance/render.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/views/finance/events.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/views/finance/index.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/views/places.js' %}?v={{ v }}"></script>
    <script src="{% static 'js/views/calendar.js' %}?v={{ v }}"></script>

    <!-- ═══════════════════════════════════════════
         Controlador principal
         ─────────────────────────────────────────── -->
    <script src="{% static 'js/main.js' %}?v={{ v }}"></script>
</body>
</html>
{% endwith %}
